# Cross-kernel conformance (#6): every push must keep both kernels in
# byte-level agreement with the frozen fixtures — and therefore with each
# other. A divergence is a spec bug or a kernel bug; either way it fails CI
# and deserves an issue, never a quiet fix.
#
# Proof outcomes (checks 5-6) run in two modes since the deterministic
# rlimit budget (#17): per-push CI uses the BYTE ORACLE — the Rust kernel
# must reproduce every direct-attempt script byte-for-byte under the pinned
# solver, which determines the outcomes (outcome = f(script bytes, solver
# version, rlimit), SPEC §7.2) without hours of z3. The FULL empirical
# re-derivation (cold prove of the whole corpus, run-stability fixpoint
# included) runs weekly and on demand.
name: conformance
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  go-kernel:
    name: reference kernel (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: oath/go.mod
      - name: build
        run: cd oath && go build ./...
      - name: unit tests
        run: cd oath && go test ./...
      - name: re-verify examples against committed store
        # make verify re-puts every example; on a checkout this must
        # reproduce the committed hashes (names.json diff = identity drift).
        run: |
          make verify
          git diff --exit-code codebase/names.json \
            || { echo "::error::reference kernel produced different hashes than the committed store"; exit 1; }
      - name: website proof ledger matches canonical fixtures (#30)
        # The site claims its numbers are read live from the machine's ledger.
        # Fail if website/lib/outcomes.json has drifted from fixtures/.
        run: make check-web-ledger

  rust-conformance:
    name: independent kernel (Rust) vs fixtures (byte-oracle mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: pin z3 4.16.0 (proof outcomes are solver-version-sensitive, SPEC §10.5)
        run: |
          curl -sSL -o z3.zip https://github.com/Z3Prover/z3/releases/download/z3-4.16.0/z3-4.16.0-x64-glibc-2.39.zip
          unzip -q z3.zip
          echo "$PWD/z3-4.16.0-x64-glibc-2.39/bin" >> "$GITHUB_PATH"
      - name: conformance (checks 1-4 + byte oracle for 5-6)
        run: |
          z3 --version
          OATHRS_CONFORMANCE_PROVE=oracle ./oathrs/conformance.sh

  rust-conformance-full:
    name: independent kernel (Rust) — full empirical re-derivation
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: pin z3 4.16.0
        run: |
          curl -sSL -o z3.zip https://github.com/Z3Prover/z3/releases/download/z3-4.16.0/z3-4.16.0-x64-glibc-2.39.zip
          unzip -q z3.zip
          echo "$PWD/z3-4.16.0-x64-glibc-2.39/bin" >> "$GITHUB_PATH"
      - name: six-check conformance (cold prove at the SPEC budget)
        # The wall cap is safety-only and never affects outcomes (those are
        # fixed by script bytes + solver + rlimit). GitHub runners burn the
        # rlimit slower than dev hardware — first dispatch invalidated at
        # the 600s default ~21 min in — so give each goal ample wall room.
        env:
          OATHRS_Z3_WALL_CAP_MS: "3600000"
        run: |
          z3 --version
          ./oathrs/conformance.sh

  wasm-build:
    name: wasm32 cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: build library + CLI for wasm (prove feature excluded)
        run: cd oathrs && cargo build --target wasm32-wasip1 --release --no-default-features
